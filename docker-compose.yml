services:
  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: insightflow-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - insightflow-network

  # Redis Cache Service
  redis:
    image: redis:7.0-alpine
    container_name: insightflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - insightflow-network

  # Zookeeper (for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: insightflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - insightflow-network

  # Apache Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: insightflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - insightflow-network

  # ----------------------------------------------------
  # Microservices Backend
  # ----------------------------------------------------

  auth-service:
    image: insightflowai-auth-service:latest
    container_name: insightflow-auth-service
    ports:
      - "8081:8081"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/insightflow
    depends_on:
      - mongodb
    networks:
      - insightflow-network

  dataset-service:
    image: insightflowai-dataset-service:latest
    container_name: insightflow-dataset-service
    ports:
      - "8082:8082"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/insightflow
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - mongodb
      - kafka
    networks:
      - insightflow-network

  analytics-service:
    image: insightflowai-analytics-service:latest
    container_name: insightflow-analytics-service
    ports:
      - "8083:8083"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/insightflow
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - insightflow-network

  notification-service:
    image: insightflowai-notification-service:latest
    container_name: insightflow-notification-service
    ports:
      - "8084:8084"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - insightflow-network

  api-gateway:
    image: insightflowai-api-gateway:latest
    container_name: insightflow-api-gateway
    ports:
      - "4000:4000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - DATASET_SERVICE_URL=http://dataset-service:8082
      - ANALYTICS_SERVICE_URL=http://analytics-service:8083
    depends_on:
      - auth-service
      - dataset-service
      - analytics-service
    networks:
      - insightflow-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: insightflowai-ai-service:latest
    container_name: insightflow-ai-service
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/insightflow
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - mongodb
      - kafka
    networks:
      - insightflow-network

  # ----------------------------------------------------
  # Frontend Static Server
  # ----------------------------------------------------

  frontend:
    image: insightflowai-frontend:latest
    container_name: insightflow-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - insightflow-network

volumes:
  mongo_data:
  redis_data:

networks:
  insightflow-network:
    driver: bridge
